<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="https://s3.ap-east-1.amazonaws.com/mcdonalds.com.hk/wp-content/uploads/2020/04/17152611/logo-1.png">
    <style>
        :root {
            --primary: #DA291C;
            --primary-dark: #B5251A;
            --gold: #FFC72C;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #2d2d2d;
            --text-light: #666;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.11);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* Sticky top bar (header + summary) */
        .sticky-top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header {
            padding: 14px 0;
            border-bottom: 3px solid var(--gold);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-img { height: 44px; width: auto; }
        .logo h1 { font-size: 1.25rem; color: var(--primary); line-height: 1.2; }
        .logo span { font-size: 0.7rem; color: var(--text-light); display: block; }
        .selected-count {
            font-weight: 600; color: var(--primary);
            background: #fff0f0; padding: 6px 16px; border-radius: 20px;
            font-size: 0.9rem; white-space: nowrap;
        }

        .summary-bar {
            padding: 12px 18px 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-start;
            justify-content: center;
            max-width: 1300px;
            margin: 0 auto;
            background: #fff;
        }
        .summary-item {
            text-align: center;
            min-width: 60px;
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .summary-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        .summary-label { font-size: 0.68rem; color: var(--text-light); white-space: nowrap; }
        .summary-dv { font-size: 0.6rem; color: #888; margin-top: 2px; }
        .summary-divider { width: 1px; background: var(--border); align-self: stretch; margin: 4px 0; }
        .btn-reset {
            background: #fff; border: 2px solid var(--primary);
            color: var(--primary); padding: 6px 16px; border-radius: 22px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: var(--transition); white-space: nowrap;
            margin-left: 8px;
        }
        .btn-reset:hover { background: var(--primary); color: #fff; }

        .main-container { max-width: 1300px; margin: 0 auto; padding: 10px 20px 40px; }
        .disclaimer {
            background: #fffbe6; border: 1px solid #ffe58f;
            border-radius: var(--radius-sm); padding: 12px 16px;
            font-size: 0.78rem; color: #8c6d00; margin-bottom: 18px; line-height: 1.6;
        }
        .disclaimer a { color: var(--primary); font-weight: 600; }

        .category-section {
            margin-bottom: 16px; background: #fff;
            border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
        }
        .category-header {
            display: flex; align-items: center; gap: 10px;
            padding: 13px 18px; cursor: pointer; background: #fafafa;
            border-bottom: 1px solid var(--border); user-select: none;
            transition: background 0.15s;
        }
        .category-header:hover { background: #f0f0f0; }
        .cat-icon-img { height: 36px; width: auto; object-fit: contain; flex-shrink: 0; }
        .category-header h2 { font-size: 1.05rem; flex: 1; font-weight: 600; }
        .category-count {
            background: var(--gold); color: #000;
            font-size: 0.7rem; padding: 2px 10px; border-radius: 10px;
            font-weight: 600; white-space: nowrap;
        }
        .collapse-arrow {
            width: 22px; height: 22px; display: flex; align-items: center;
            justify-content: center; transition: transform 0.25s ease;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .category-section.collapsed .collapse-arrow { transform: rotate(-90deg); }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 7px; padding: 12px 14px;
            transition: max-height 0.3s ease, opacity 0.2s, padding 0.2s;
            overflow: hidden;
        }
        .category-section.collapsed .product-grid {
            max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0; pointer-events: none;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            padding: 9px 11px;
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            user-select: none;
            position: relative;
        }
        .product-card:hover { box-shadow: var(--shadow-hover); }
        .product-card.selected { border-color: var(--primary); background: #fef9f9; }
        .product-card input[type="checkbox"] { display: none; }
        .product-img {
            width: 52px; height: 52px;
            border-radius: 8px; object-fit: contain;
            background: #f9f9f9; flex-shrink: 0;
            border: 1px solid #eee;
        }
        .product-info { flex: 1; min-width: 0; }
        .product-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 3px; line-height: 1.3; }
        .product-nutrition {
            display: flex; flex-wrap: wrap; gap: 2px 5px;
            font-size: 0.66rem; color: var(--text-light);
        }
        .product-nutrition span {
            white-space: nowrap; background: #f5f5f5;
            padding: 1px 5px; border-radius: 4px;
        }
        .product-calories { font-weight: 700; color: var(--primary); }
        .check-indicator {
            position: absolute; top: 7px; right: 8px;
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid #ccc; display: flex;
            align-items: center; justify-content: center;
            font-size: 10px; transition: var(--transition);
        }
        .product-card.selected .check-indicator {
            background: var(--primary); border-color: var(--primary); color: #fff;
        }

        .quantity-control {
            display: flex; align-items: center; gap: 5px; margin-top: 6px;
            font-size: 0.75rem; user-select: none;
        }
        .qty-btn {
            width: 22px; height: 22px; border-radius: 50%;
            border: 1px solid #ccc; background: #f9f9f9;
            cursor: pointer; font-size: 0.9rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); color: var(--text);
        }
        .qty-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .qty-value { min-width: 20px; text-align: center; font-weight: 600; color: var(--text); }

        .footer {
            text-align: center; padding: 18px; color: var(--text-light);
            font-size: 0.72rem; border-top: 1px solid var(--border); margin-top: 8px;
        }
        .footer a { color: var(--primary); }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; }
            .summary-bar { padding: 8px 6px; gap: 4px; }
            .summary-value { font-size: 1rem; }
            .summary-label { font-size: 0.6rem; }
            .summary-dv { font-size: 0.55rem; }
            .product-img { width: 42px; height: 42px; }
            .cat-icon-img { height: 28px; }
            .btn-reset { padding: 4px 12px; font-size: 0.8rem; }
        }
    </style>
</head>

    const categoryOrder = [

    ];

    function renderProducts() {
        const container = document.getElementById('productSections');
        const groups = {};
        products.forEach(p => {
            if (!groups[p.cat]) groups[p.cat] = { items: [] };
            groups[p.cat].items.push(p);
        });
        let html = '';
        categoryOrder.forEach(catInfo => {
            const catKey = catInfo.key;
            if (!groups[catKey]) return;
            const catItems = groups[catKey].items;
            html += `
            <div class="category-section collapsed" id="sec-${catKey}">
                <div class="category-header" onclick="toggleCategory('${catKey}')">
                    <img src="${catInfo.iconUrl}" alt="" class="cat-icon-img">
                    <h2>${catInfo.label}</h2>
                    <span class="category-count">${catItems.length} 款</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="product-grid">
                    ${catItems.map(p => `
                        <label class="product-card" for="chk_${p.id}">
                            <input type="checkbox" id="chk_${p.id}" data-id="${p.id}" onchange="toggleProduct(this)">
                            <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">
                            <div class="product-info">
                                <div class="product-name">${p.name}</div>
                                <div class="product-nutrition">
                                    <span class="product-calories">🔥 ${p.kcal} kcal</span>
                                    <span>💪 ${p.protein}g</span>
                                    <span>🧈 ${p.fat}g</span>
                                    <span>🌾 ${p.carbs}g</span>
                                    <span>🧂 ${p.sodium}mg</span>
                                </div>
                                <div class="quantity-control" onclick="event.stopPropagation()">
                                    <button class="qty-btn" onclick="changeQuantity(event, '${p.id}', -1)">−</button>
                                    <span class="qty-value" id="qty_${p.id}">1</span>
                                    <button class="qty-btn" onclick="changeQuantity(event, '${p.id}', 1)">+</button>
                                </div>
                            </div>
                            <div class="check-indicator">✓</div>
                        </label>
                    `).join('')}
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function toggleCategory(catKey) {
        document.getElementById(`sec-${catKey}`).classList.toggle('collapsed');
    }

    function toggleProduct(checkbox) {
        const card = checkbox.closest('.product-card');
        card.classList.toggle('selected', checkbox.checked);
        updateTotals();
    }

    function changeQuantity(event, id, delta) {
        event.stopPropagation();
        event.preventDefault();
        const qtySpan = document.getElementById('qty_' + id);
        if (!qtySpan) return;
        let qty = parseInt(qtySpan.textContent) || 1;
        qty = Math.max(1, qty + delta);
        qtySpan.textContent = qty;
        updateTotals();
    }

    // 每日參考值 (香港常用)
    const DV = {
        kcal: 2000,
        protein: 60,
        fat: 60,
        carbs: 300,
        sodium: 2000
    };

    function updateTotals() {
        const checked = document.querySelectorAll('input[type="checkbox"]:checked');
        let kcal=0, protein=0, fat=0, carbs=0, sodium=0;
        checked.forEach(cb => {
            const p = products.find(p => p.id === cb.dataset.id);
            if (p) {
                const qtySpan = document.getElementById('qty_' + p.id);
                const qty = qtySpan ? parseInt(qtySpan.textContent) || 1 : 1;
                kcal += p.kcal * qty;
                protein += p.protein * qty;
                fat += p.fat * qty;
                carbs += p.carbs * qty;
                sodium += p.sodium * qty;
            }
        });

        document.getElementById('totalCalories').textContent = Math.round(kcal);
        document.getElementById('totalProtein').textContent = protein.toFixed(1);
        document.getElementById('totalFat').textContent = fat.toFixed(1);
        document.getElementById('totalCarbs').textContent = carbs.toFixed(1);
        document.getElementById('totalSodium').textContent = Math.round(sodium);

        document.getElementById('dvCalories').textContent = Math.round((kcal / DV.kcal) * 100) + '%';
        document.getElementById('dvProtein').textContent = Math.round((protein / DV.protein) * 100) + '%';
        document.getElementById('dvFat').textContent = Math.round((fat / DV.fat) * 100) + '%';
        document.getElementById('dvCarbs').textContent = Math.round((carbs / DV.carbs) * 100) + '%';
        document.getElementById('dvSodium').textContent = Math.round((sodium / DV.sodium) * 100) + '%';

        document.getElementById('selectedCount').textContent = `已選取 ${checked.length} 項`;
    }

    function resetAll() {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.checked = false;
            cb.closest('.product-card').classList.remove('selected');
        });
        document.querySelectorAll('.qty-value').forEach(span => span.textContent = '1');
        updateTotals();
    }

    // 初始化
    renderProducts();
    updateTotals();
    // 預設全部摺疊（已在 render 時加入 collapsed class，無需再次添加）
</script>
